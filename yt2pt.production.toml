# yt2pt configuration

[yt2pt]
# data_dir and log_dir default to standard Linux paths:
#   root mode:  /var/lib/yt2pt             and  /var/log/yt2pt
#   user mode:  ~/.local/share/yt2pt       and  ~/.local/share/yt2pt/logs
#   dev  mode:  ~/.local/share/yt2pt       and  ~/.local/share/yt2pt/logs
#               (macOS, or when run from a clone of the repo)
# Uncomment to override. Config wins over $YT2PT_DATA_DIR / $YT2PT_LOG_DIR env vars.
# data_dir = "/var/lib/yt2pt"
# log_dir = "/var/log/yt2pt"
log_level = "info"                            # error | info | debug
overwrite_existing = false
skip_downloaded = true
remove_video_after_upload = false
remove_video_after_metadata_conversion = false

[http]
port = 8090
bind = "0.0.0.0"

[workers]
download_concurrency = 1
convert_concurrency = 1
upload_concurrency = 1

[ytdlp]
# Cap at 1080p by default. Override to "bv*+ba/b" for absolute best quality.
format = "bv*[height<=1080]+ba/b[height<=1080]"
merge_output_format = "mkv"
thumbnail_format = "jpg"
# Bandwidth cap passed verbatim to yt-dlp's --limit-rate. Suffixes K/M/G accepted.
# Set rate_limit_enabled = false to disable the cap entirely.
rate_limit_enabled = true
rate_limit = "10M"

[peertube]
instance_url = ""
api_token = ""
channel_id = ""
privacy = "public"                            # public | unlisted | private | internal | password_protected
language = ""
licence = ""                                  # e.g. "Attribution - Share Alike"
comments_policy = "enabled"                   # enabled | disabled | requires_approval
wait_transcoding = true
generate_transcription = true
