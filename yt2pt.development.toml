# yt2pt development configuration
#
# This template is used when running yt2pt from a source checkout.
# The install script copies it to yt2pt.toml in the repo root.

[yt2pt]
# data_dir and log_dir default to ~/.local/share/yt2pt in dev mode.
# Uncomment to override.
# data_dir = ""
# log_dir = ""
log_level = "debug"
overwrite_existing = false
skip_downloaded = true
remove_video_after_upload = false
remove_video_after_metadata_conversion = false

[http]
port = 8090
bind = "127.0.0.1"

[workers]
download_concurrency = 1
convert_concurrency = 1
upload_concurrency = 1

[ytdlp]
format = "bv*[height<=1080]+ba/b[height<=1080]"
merge_output_format = "mkv"
thumbnail_format = "jpg"
rate_limit_enabled = true
rate_limit = "10M"
cookies_file = ""

[peertube]
instance_url = ""
api_token = ""
channel_id = ""
privacy = "public"
language = ""
licence = ""
comments_policy = "enabled"
wait_transcoding = true
generate_transcription = true
